<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三支一扶随身练 V4 (稳定重构版)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 20px; color: #333; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        textarea { width: 100%; height: 180px; margin-bottom: 15px; padding: 12px; font-family: monospace; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; resize: none; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        button:active { opacity: 0.8; }
        .opt-btn { background: #f8f9fa; color: #333; border: 1px solid #ddd; text-align: left; padding: 15px; margin-bottom: 12px; border-radius: 8px; font-size: 15px; line-height: 1.4; transition: 0.2s; }
        .opt-btn.selected { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
        .opt-btn.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        .hidden { display: none !important; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .report-box { background: #f8f9fa; padding: 15px; border: 1px solid #e9ecef; margin-bottom: 15px; border-radius: 8px; white-space: pre-wrap; font-size: 14px; color: #555; }
        .badge { background: #e8f0fe; color: #1a73e8; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="page-home" class="card">
    <h2 style="text-align: center; margin-bottom: 20px; color: #1a73e8;">三支一扶随身练 V4</h2>
    <label style="font-size:14px; font-weight:bold; display:block; margin-bottom:10px;">请粘贴 JSON 题库数据：</label>
    <textarea id="json-input">[
  {
    "id": "Q_001",
    "type": "single",
    "question": "我国“三支一扶”计划中的“三支”具体是指以下哪项？",
    "options": {"A": "支教、支农、支医", "B": "支教、支工、支医", "C": "支商、支农、支医", "D": "支教、支农、支兵"},
    "answer": "A"
  },
  {
    "id": "Q_002",
    "type": "multiple",
    "question": "以下属于“三支一扶”人员享受的政策待遇有？（多选）",
    "options": {"A": "生活补贴", "B": "社会保险", "C": "直接提拔为乡长", "D": "期满后考研加分"},
    "answer": "ABD"
  }
]</textarea>
    <button id="btn-start">🚀 开始答题</button>
</div>

<div id="page-quiz" class="card hidden">
    <div class="flex-between">
        <span id="progress" style="font-weight:bold; color:#666;">1 / 1</span>
        <button id="btn-star" style="width: auto; padding: 8px 15px; background: #fff; border: 1px solid #ccc; color: #333; margin: 0;">☆ 收藏</button>
    </div>
    <div id="question-title" style="font-size: 16px; font-weight: bold; margin-bottom: 20px; line-height: 1.5;">题目加载中...</div>
    <div id="options-area"></div>
    <div id="feedback-area" style="margin-bottom: 15px; font-weight: bold; text-align: center;"></div>
    <button id="btn-next">确认答案</button>
</div>

<div id="page-result" class="card hidden">
    <h2 style="text-align: center; color: #1a73e8;">练习结算报告</h2>
    <div id="score-display" style="text-align: center; color: #e67e22; font-size: 32px; font-weight: bold; margin: 20px 0;">0 分</div>
    <div id="report-area"></div>
    <button id="btn-restart" style="background:#6c757d; margin-top: 20px;">重新导入新题库</button>
</div>

<script>
    // 将所有数据统一管理，避免变量污染
    const App = {
        data: [],
        current: 0,
        score: 0,
        wrongList: [],
        stars: new Set(),
        selected: []
    };

    // DOM 元素获取
    const DOM = {
        home: document.getElementById('page-home'),
        quiz: document.getElementById('page-quiz'),
        result: document.getElementById('page-result'),
        input: document.getElementById('json-input'),
        title: document.getElementById('question-title'),
        opts: document.getElementById('options-area'),
        progress: document.getElementById('progress'),
        feedback: document.getElementById('feedback-area'),
        btnNext: document.getElementById('btn-next'),
        btnStar: document.getElementById('btn-star'),
        btnStart: document.getElementById('btn-start'),
        btnRestart: document.getElementById('btn-restart')
    };

    // 绑定原生点击事件
    DOM.btnStart.addEventListener('click', startQuiz);
    DOM.btnNext.addEventListener('click', handleNext);
    DOM.btnStar.addEventListener('click', toggleStar);
    DOM.btnRestart.addEventListener('click', () => location.reload());

    function startQuiz() {
        try {
            const rawText = DOM.input.value.trim().replace(/[\u200B-\u200D\uFEFF]/g, '');
            if(!rawText) return alert("❌ 题库内容不能为空！");
            
            App.data = JSON.parse(rawText);
            if(!Array.isArray(App.data) || App.data.length === 0) return alert("❌ 题库格式不正确或为空！");
            
            // 数据重置
            App.current = 0;
            App.score = 0;
            App.wrongList = [];
            App.stars.clear();
            
            // 切换页面
            DOM.home.classList.add('hidden');
            DOM.quiz.classList.remove('hidden');
            
            renderQuestion();
        } catch (e) {
            alert("❌ 解析题库失败，请检查逗号、引号是否缺失。\\n具体错误：" + e.message);
        }
    }

    function renderQuestion() {
        const q = App.data[App.current];
        App.selected = []; 
        
        DOM.progress.innerText = `${App.current + 1} / ${App.data.length}`;
        DOM.title.innerHTML = `<span class="badge">${q.type === 'multiple' ? '多选' : '单选'}</span> ${q.question}`;
        DOM.feedback.innerText = "";
        DOM.btnNext.innerText = "确认答案";
        
        // 渲染星星
        if (App.stars.has(q.id)) {
            DOM.btnStar.innerText = "★ 已收藏";
            DOM.btnStar.style.color = "#f1c40f";
        } else {
            DOM.btnStar.innerText = "☆ 收藏";
            DOM.btnStar.style.color = "#333";
        }
        
        // 渲染选项
        DOM.opts.innerHTML = "";
        for (let key in q.options) {
            let btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = `${key}. ${q.options[key]}`;
            btn.addEventListener('click', () => selectOption(btn, key, q.type));
            DOM.opts.appendChild(btn);
        }
    }

    function selectOption(btn, key, type) {
        if (DOM.btnNext.innerText !== "确认答案") return; // 已经确认答案，锁定选项
        
        if (type === 'single') {
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
            App.selected = [key];
            btn.classList.add('selected');
        } else {
            let idx = App.selected.indexOf(key);
            if (idx > -1) {
                App.selected.splice(idx, 1);
                btn.classList.remove('selected');
            } else {
                App.selected.push(key);
                btn.classList.add('selected');
            }
        }
    }

    function toggleStar() {
        const q = App.data[App.current];
        if (App.stars.has(q.id)) {
            App.stars.delete(q.id);
            DOM.btnStar.innerText = "☆ 收藏";
            DOM.btnStar.style.color = "#333";
        } else {
            App.stars.add(q.id);
            DOM.btnStar.innerText = "★ 已收藏";
            DOM.btnStar.style.color = "#f1c40f";
        }
    }

    function handleNext() {
        const q = App.data[App.current];
        
        // 阶段一：确认答案看解析
        if (DOM.btnNext.innerText === "确认答案") {
            if (App.selected.length === 0) return alert("⚠️ 请先选择一个答案！");
            
            let myAns = App.selected.sort().join('');
            let isCorrect = (myAns === q.answer.split('').sort().join(''));
            
            // 按钮染色提示
            document.querySelectorAll('.opt-btn').forEach(btn => {
                let k = btn.innerText.charAt(0);
                if (q.answer.includes(k)) btn.classList.add('correct');
                else if (myAns.includes(k) && !q.answer.includes(k)) btn.classList.add('wrong');
            });
            
            if (isCorrect) {
                DOM.feedback.style.color = '#155724';
                DOM.feedback.innerText = "🎉 回答正确！";
                App.score++;
            } else {
                DOM.feedback.style.color = '#721c24';
                DOM.feedback.innerText = `❌ 回答错误！正确答案: ${q.answer}`;
            }
            
            if (!isCorrect || App.stars.has(q.id)) {
                App.wrongList.push({ id: q.id, q: q.question, my: myAns, right: q.answer });
            }
            
            DOM.btnNext.innerText = (App.current === App.data.length - 1) ? "查看最终结算" : "进入下一题";
            return;
        }
        
        // 阶段二：切换到下一题或结算
        App.current++;
        if (App.current >= App.data.length) {
            showReport();
        } else {
            renderQuestion();
        }
    }

    function showReport() {
        DOM.quiz.classList.add('hidden');
        DOM.result.classList.remove('hidden');
        
        let finalScore = Math.round((App.score / App.data.length) * 100);
        document.getElementById('score-display').innerText = `${finalScore} 分`;
        
        let area = document.getElementById('report-area');
        area.innerHTML = "";
        
        if (App.wrongList.length === 0) {
            area.innerHTML = "<div class='report-box' style='text-align:center;'>太棒了！全对且无收藏，完美通过！</div>";
            return;
        }
        
        // 错题分段
        for (let i = 0, batch = 1; i < App.wrongList.length; i += 5, batch++) {
            let chunk = App.wrongList.slice(i, i + 5);
            let text = `【错题与收藏解析申请 - 第 ${batch} 批】\n请调取原版解析并通俗讲解：\n\n`;
            
            chunk.forEach(item => {
                text += `题目: [${item.id}] ${item.q}\n(我的选择: ${item.my} | 正确: ${item.right})\n---\n`;
            });
            
            let div = document.createElement('div');
            div.innerHTML = `
                <div style="font-weight:bold; margin-bottom:5px;">分段报告 ${batch}</div>
                <div class="report-box" id="txt-${batch}">${text}</div>
                <button onclick="window.copyRpt(${batch})" style="background:#28a745; margin-bottom:20px;">一键复制 第 ${batch} 批</button>
            `;
            area.appendChild(div);
        }
    }
    
    // 全局复制函数
    window.copyRpt = function(idx) {
        let text = document.getElementById(`txt-${idx}`).innerText;
        navigator.clipboard.writeText(text).then(() => alert(`✅ 第 ${idx} 批报告已复制！`)).catch(() => alert("复制受限，请手动长按复制。"));
    }
</script>
</body>
</html>
